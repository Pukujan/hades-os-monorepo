name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend
        run: npm ci
        working-directory: backend

      - name: Install frontend
        run: npm ci
        working-directory: frontend

      - name: Run CI checks
        run: npm run test:ci

      - name: Build frontend
        run: npm run build

  frontend-unit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        run: npm ci
        working-directory: frontend

      - name: Vitest unit tests
        run: npx vitest run
        working-directory: frontend

  codex-review:
    if: github.event_name == 'pull_request'
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Codex review
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Review this change for glue-code risk, test gaps, and contract drift.
            Focus on backend/src/modules/hades, backend/src/modules/auth, frontend/src/api, and frontend/src/core.
